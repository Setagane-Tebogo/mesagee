<script>

const words=[
// KEEP YOUR 75 WORDS HERE
];

let scoreA=0;
let scoreB=0;
let round=1;

let current="";
let revealed=false;

function scramble(word){

let arr=word.split("");

for(
let i=arr.length-1;
i>0;
i--
){

let j=
Math.floor(
Math.random()
*
(i+1)
);

[arr[i],arr[j]]
=
[arr[j],arr[i]];

}

return arr.join("");

}

function nextWord(){

revealed=false;

current=
words[
Math.floor(
Math.random()
*
words.length
)
];

document
.getElementById(
"word"
)
.innerHTML=
scramble(current);

document
.getElementById(
"answer"
)
.innerHTML=
"";

}

function revealWord(){

if(revealed)
return;

revealed=true;

document
.getElementById(
"answer"
)
.innerHTML=
"📖 Answer: <b>"
+
current+
"</b>";

}

function moveNext(){

round++;

document
.getElementById(
"count"
)
.innerHTML=
round;

nextWord();

}

function groupA(){

if(!revealed){

alert(
"Reveal the answer first!"
);

return;

}

scoreA++;

document
.getElementById(
"a"
)
.innerHTML=
scoreA;

moveNext();

}

function groupB(){

if(!revealed){

alert(
"Reveal the answer first!"
);

return;

}

scoreB++;

document
.getElementById(
"b"
)
.innerHTML=
scoreB;

moveNext();

}

function noWinner(){

if(!revealed){

alert(
"Reveal the answer first!"
);

return;

}

moveNext();

}

function resetGame(){

scoreA=0;

scoreB=0;

round=1;

document
.getElementById(
"a"
).innerHTML=0;

document
.getElementById(
"b"
).innerHTML=0;

document
.getElementById(
"count"
).innerHTML=1;

nextWord();

}

nextWord();

</script>
