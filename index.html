<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bible Scramble Game</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
linear-gradient(
135deg,
#0f2027,
#203a43,
#2c5364
);

padding:20px;

}

.container{

width:100%;
max-width:800px;

background:
rgba(255,255,255,.12);

backdrop-filter:blur(15px);

padding:35px;

border-radius:28px;

color:white;

text-align:center;

box-shadow:
0 15px 40px
rgba(0,0,0,.35);

}

h1{

font-size:42px;

margin-bottom:10px;

}

.subtitle{

opacity:.8;

margin-bottom:25px;

}

.scramble{

font-size:46px;

font-weight:bold;

letter-spacing:6px;

padding:25px;

border-radius:22px;

background:
rgba(255,255,255,.15);

margin-bottom:20px;

word-break:break-word;

}

.answer{

font-size:28px;

min-height:60px;

color:#ffe082;

margin-bottom:20px;

}

.buttons{

display:grid;

grid-template-columns:
1fr 1fr;

gap:15px;

}

button{

padding:16px;

border:none;

border-radius:16px;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:.25s;

}

button:hover{

transform:scale(1.03);

}

.reveal{
grid-column:span 2;
background:#9b59b6;
color:white;
}

.a{
background:#27ae60;
color:white;
}

.b{
background:#3498db;
color:white;
}

.none{
background:#f39c12;
color:white;
}

.reset{
background:#e74c3c;
color:white;
}

.score{

margin-top:25px;

font-size:28px;

}

.round{

margin-top:12px;

font-size:18px;

opacity:.9;

}

@media(max-width:600px){

.buttons{

grid-template-columns:1fr;

}

.reveal{

grid-column:span 1;

}

.scramble{

font-size:34px;

}

}

</style>

</head>

<body>

<div class="container">

<h1>📖 Bible Scramble</h1>

<div class="subtitle">
Game By TTFM
</div>

<div
id="scramble"
class="scramble">
</div>

<div
id="answer"
class="answer">
</div>

<div class="buttons">

<button
class="reveal"
onclick="revealWord()">
👁 Reveal Answer
</button>

<button
class="a"
onclick="groupA()">
🏆 Group A Correct
</button>

<button
class="b"
onclick="groupB()">
🏆 Group B Correct
</button>

<button
class="none"
onclick="nobody()">
❌ Nobody Got Correct
</button>

<button
class="reset"
onclick="resetGame()">
🔄 Reset Game
</button>

</div>

<div class="score">

Group A:
<span id="scoreA">0</span>

|

Group B:
<span id="scoreB">0</span>

</div>

<div class="round">

Round:
<span id="round">1</span>

</div>

</div>

<script>

const words=[

"ADAM",
"EVE",
"CAIN",
"ABEL",
"SETH",
"NOAH",
"ABRAHAM",
"SARAH",
"ISAAC",
"REBEKAH",
"JACOB",
"LEAH",
"RACHEL",
"JOSEPH",
"BENJAMIN",
"MOSES",
"AARON",
"JOSHUA",
"CALEB",
"GIDEON",
"SAMSON",
"DELILAH",
"RUTH",
"BOAZ",
"SAMUEL",
"SAUL",
"DAVID",
"SOLOMON",
"ELIJAH",
"ELISHA",
"ISAIAH",
"JEREMIAH",
"LAMENTATIONS",
"EZEKIEL",
"DANIEL",
"HOSEA",
"JOEL",
"AMOS",
"OBADIAH",
"JONAH",
"MICAH",
"NAHUM",
"HABAKKUK",
"ZEPHANIAH",
"HAGGAI",
"ZECHARIAH",
"MALACHI",
"ESTHER",
"EZRA",
"NEHEMIAH",
"JOB",
"MARY",
"JOSEPH",
"JESUS",
"PETER",
"ANDREW",
"JAMES",
"JOHN",
"MATTHEW",
"MARK",
"LUKE",
"THOMAS",
"JUDAS",
"BARTHOLOMEW",
"PAUL",
"TIMOTHY",
"TITUS",
"STEPHEN",
"LAZARUS",
"MARTHA",
"NICODEMUS",
"ZACCHAEUS",
"SILAS",
"ANNA"

];

let scoreA=0;

let scoreB=0;

let round=1;

let current="";

let revealed=false;

function shuffle(word){

let arr=
word.split("");

for(
let i=
arr.length-1;
i>0;
i--
){

let j=
Math.floor(
Math.random()
*
(i+1)
);

[arr[i],arr[j]]
=
[arr[j],arr[i]];

}

let result=
arr.join("");

if(
result===
word
){

return shuffle(word);

}

return result;

}

function nextWord(){

revealed=false;

current=
words[
Math.floor(
Math.random()
*
words.length
)
];

document
.getElementById(
"scramble"
)
.innerHTML=
shuffle(
current
);

document
.getElementById(
"answer"
)
.innerHTML=
"";

}

function revealWord(){

if(revealed)
return;

revealed=true;

document
.getElementById(
"answer"
)
.innerHTML=
"📖 "+
current;

}

function nextRound(){

round++;

document
.getElementById(
"round"
)
.innerHTML=
round;

nextWord();

}

function groupA(){

if(!revealed){

alert(
"Reveal answer first"
);

return;

}

scoreA++;

document
.getElementById(
"scoreA"
)
.innerHTML=
scoreA;

nextRound();

}

function groupB(){

if(!revealed){

alert(
"Reveal answer first"
);

return;

}

scoreB++;

document
.getElementById(
"scoreB"
)
.innerHTML=
scoreB;

nextRound();

}

function nobody(){

if(!revealed){

alert(
"Reveal answer first"
);

return;

}

nextRound();

}

function resetGame(){

scoreA=0;

scoreB=0;

round=1;

document
.getElementById(
"scoreA"
)
.innerHTML=0;

document
.getElementById(
"scoreB"
)
.innerHTML=0;

document
.getElementById(
"round"
)
.innerHTML=1;

nextWord();

}

nextWord();

</script>

</body>
</html>
